<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>我的日程 & 台账</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f4f0;color:#2c2c2a;min-height:100vh}
.app{max-width:760px;margin:0 auto;padding:20px 16px}
h1{font-size:22px;font-weight:600;margin-bottom:4px;color:#2c2c2a}
.subtitle{font-size:13px;color:#888;margin-bottom:20px}
.nav{display:flex;gap:4px;margin-bottom:18px;background:#e8e7e2;padding:4px;border-radius:14px}
.nav-btn{flex:1;padding:9px 0;border:none;background:transparent;cursor:pointer;border-radius:10px;font-size:13px;font-weight:500;color:#888;transition:all .15s}
.nav-btn.active{background:#fff;color:#2c2c2a;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.panel{display:none}
.panel.active{display:block}
.card{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px;border:1px solid #ebe9e4}
.section-title{font-size:12px;color:#aaa;margin-bottom:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.input-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.input-row input,.input-row select{flex:1;min-width:80px;padding:8px 10px;border:1px solid #e0dedd;border-radius:8px;background:#faf9f7;color:#2c2c2a;font-size:13px;outline:none}
.input-row input:focus,.input-row select:focus{border-color:#888;background:#fff}
.input-row select{max-width:90px;cursor:pointer}
.btn-add{padding:8px 16px;background:#2c2c2a;border:none;border-radius:8px;cursor:pointer;font-size:13px;color:#fff;white-space:nowrap;transition:opacity .15s}
.btn-add:hover{opacity:.82}
.task-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0eeea}
.task-item:last-child{border-bottom:none}
.task-check{width:18px;height:18px;border:1.5px solid #ccc;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#faf9f7;transition:all .15s}
.task-check.done{background:#2c2c2a;border-color:#2c2c2a}
.task-check.done::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.task-text{flex:1;font-size:14px;color:#2c2c2a;line-height:1.5}
.task-text.done{text-decoration:line-through;color:#bbb}
.priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.p-high{background:#e24b4a}.p-mid{background:#ef9f27}.p-low{background:#639922}
.task-del{cursor:pointer;color:#ccc;font-size:18px;line-height:1;padding:0 2px}
.task-del:hover{color:#e24b4a}
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:#f5f4f0;border-radius:10px;padding:10px 12px}
.stat-label{font-size:11px;color:#aaa;margin-bottom:4px;font-weight:500}
.stat-val{font-size:22px;font-weight:600;color:#2c2c2a}
.stat-val.income{color:#1d9e75}
.stat-val.expense{color:#d85a30}
.stat-val.balance{color:#185fa5}
.stat-val.remain{color:#e24b4a}
.stat-val.day{color:#639922}
.ledger-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0eeea}
.ledger-item:last-child{border-bottom:none}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.linfo{flex:1}
.lname{font-size:14px;color:#2c2c2a}
.lmeta{font-size:11px;color:#aaa;margin-top:2px}
.lamt{font-size:14px;font-weight:600}
.lamt.in{color:#1d9e75}.lamt.out{color:#d85a30}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:#888;width:32px;text-align:right;flex-shrink:0}
.bar-bg{flex:1;height:7px;background:#f0eeea;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-val{font-size:11px;color:#aaa;min-width:48px;text-align:right;flex-shrink:0}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border:1px solid #e0dedd;border-radius:20px;background:transparent;cursor:pointer;font-size:12px;color:#888;transition:all .15s}
.filter-btn.on{background:#2c2c2a;border-color:#2c2c2a;color:#fff}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-hd{text-align:center;font-size:11px;color:#aaa;padding:4px 0;font-weight:600}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-size:12px;color:#2c2c2a;position:relative;transition:background .1s}
.cal-day:hover{background:#f0eeea}
.cal-day.today{background:#2c2c2a;color:#fff;font-weight:600}
.cal-day.selected:not(.today){background:#e8e7e2;font-weight:600}
.cal-day.has-task::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;background:#ef9f27;border-radius:50%}
.cal-day.empty-day{color:#d3d1c7;cursor:default}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav button{border:none;background:transparent;cursor:pointer;color:#888;font-size:20px;padding:0 4px;line-height:1}
.month-nav button:hover{color:#2c2c2a}
.month-nav span{font-size:15px;font-weight:600;color:#2c2c2a}
.date-head{font-size:11px;color:#aaa;padding:6px 0 4px;font-weight:600;letter-spacing:.05em}
.empty{text-align:center;padding:24px 0;color:#ccc;font-size:13px}
.habit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.habit-name{font-size:13px;width:64px;flex-shrink:0;color:#2c2c2a}
.habit-boxes{display:flex;gap:4px}
.hbox{width:30px;height:30px;border-radius:7px;border:1px solid #e0dedd;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:#aaa;transition:all .15s}
.hbox.checked{background:#2c2c2a;border-color:#2c2c2a;color:#fff}
.tag-urgent{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:#fce8e8;color:#a32d2d;margin-left:4px;font-weight:500}

/* 🔥 灵感助手专属样式（匹配原有风格） */
.chat-msg {margin-bottom:10px;display:flex;flex-direction:column;gap:4px}
.chat-msg.user {align-items:flex-end}
.chat-msg.bot {align-items:flex-start}
.chat-bubble {max-width:75%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5}
.chat-msg.user .chat-bubble {background:#2c2c2a;color:#fff;border-bottom-right-radius:4px}
.chat-msg.bot .chat-bubble {background:#e8e7e2;color:#2c2c2a;border-bottom-left-radius:4px}
#chat-box::-webkit-scrollbar {width:4px}
#chat-box::-webkit-scrollbar-thumb {background:#ccc;border-radius:2px}
.ai-tag{display:inline-block;padding:2px 6px;margin:0 2px;border-radius:4px;font-size:11px;color:#fff}
.tag-work{background:#2c2c2a}
.tag-life{background:#639922}
.tag-ledger{background:#d85a30}
.tag-idea{background:#7f77dd}
.ai-add-btn{margin-top:6px;padding:4px 10px;background:#fff;border:1px solid #2c2c2a;border-radius:6px;font-size:12px;cursor:pointer;color:#2c2c2a}
.ai-add-btn:hover{background:#f0eeea}

/* 🎙️ 语音识别按钮 */
.btn-voice{padding:8px 13px;background:#fff;border:1.5px solid #e0dedd;border-radius:8px;cursor:pointer;font-size:16px;color:#888;transition:all .2s;flex-shrink:0;line-height:1}
.btn-voice:hover{border-color:#888;color:#2c2c2a}
.btn-voice.listening{background:#e24b4a;border-color:#e24b4a;color:#fff;animation:pulse .8s infinite alternate}
.btn-voice.listening::after{content:'录音中...';font-size:11px;position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);color:#e24b4a;white-space:nowrap}
.btn-voice-wrap{position:relative;display:inline-flex}
@keyframes pulse{from{opacity:1;transform:scale(1)}to{opacity:.75;transform:scale(1.08)}}
.voice-hint{font-size:11px;color:#aaa;text-align:center;margin-top:-6px;margin-bottom:8px;min-height:16px}
.voice-no-support{color:#e24b4a}
</style>
<!-- Firebase SDK -->
<script src="https://unpkg.com/firebase@10.12.2/firebase-app-compat.js"></script>
<script src="https://unpkg.com/firebase@10.12.2/firebase-database-compat.js"></script>
</head>
<body>
<div class="app">
  <h1>我的日程 & 台账</h1>
  <p class="subtitle">工作 · 生活 · 零花钱，一处管理</p>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 12px;background:#fff;border-radius:10px;border:1px solid #ebe9e4;font-size:12px;">
    <span id="sync-status" style="color:#aaa">💻 本地模式</span>
    <span style="color:#ccc;font-size:11px">多设备同步</span>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('voice',this)">🎙️ 语音</button>
    <button class="nav-btn" onclick="switchTab('work',this)">💼 工作</button>
    <button class="nav-btn" onclick="switchTab('life',this)">🌿 生活</button>
    <button class="nav-btn" onclick="switchTab('ledger',this)">💰 台账</button>
    <button class="nav-btn" onclick="switchTab('ideas',this)">💡 灵感</button>
  </div>

  <!-- 🎙️ 语音面板 -->
  <div id="tab-voice" class="panel active">
    <div class="card">
      <div class="section-title" style="font-size:15px;color:#2c2c2a;margin-bottom:6px">🎙️ 语音输入</div>
      <p style="font-size:13px;color:#aaa;margin-bottom:18px">按住说话，松开后豆包自动整理分类</p>
      <div style="display:flex;justify-content:center;margin-bottom:16px">
        <button id="voice-main-btn"
          onclick="toggleVoiceMain()"
          style="width:110px;height:110px;border-radius:50%;border:none;background:#2c2c2a;color:#fff;font-size:36px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:all .2s;user-select:none;-webkit-user-select:none">🎙️</button>
      </div>
      <div id="voice-main-hint" style="text-align:center;font-size:13px;color:#aaa;margin-bottom:16px;min-height:20px">点击开始说话，再点结束</div>
      <div id="voice-result-box" style="display:none">
        <div style="background:#f5f4f0;border-radius:12px;padding:14px;margin-bottom:14px">
          <div style="font-size:11px;color:#aaa;margin-bottom:6px">📝 原始识别</div>
          <div id="voice-raw-text" style="font-size:13px;color:#888;line-height:1.6"></div>
        </div>
        <div id="voice-ai-result" style="display:none;border:1.5px solid #e0dedd;border-radius:12px;padding:14px;margin-bottom:14px">
          <div style="font-size:11px;color:#aaa;margin-bottom:8px">✨ 豆包整理结果</div>
          <div id="voice-ai-text" style="font-size:14px;color:#2c2c2a;line-height:1.7;margin-bottom:12px"></div>
          <div style="font-size:11px;color:#aaa;margin-bottom:8px">📂 建议存入：<span id="voice-ai-cat" style="color:#185fa5;font-weight:600"></span></div>
          <div style="display:flex;gap:8px">
            <button id="voice-confirm-btn" onclick="confirmVoiceSave()" style="flex:2;padding:12px;background:#2c2c2a;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600">✅ 确认存入</button>
            <button onclick="resetVoice()" style="flex:1;padding:12px;background:#f5f4f0;color:#888;border:1.5px solid #e0dedd;border-radius:10px;cursor:pointer;font-size:13px">重说</button>
          </div>
        </div>
        <div id="voice-save-hint" style="font-size:13px;color:#1d9e75;text-align:center;min-height:18px;font-weight:500"></div>
      </div>
    </div>
  </div>

  <!-- 工作面板 -->
  <div id="tab-work" class="panel">
    <div class="card">
      <div class="month-nav">
        <button onclick="calPrev()">‹</button>
        <span id="cal-title"></span>
        <button onclick="calNext()">›</button>
      </div>
      <div class="calendar-grid" id="cal-hds"></div>
      <div class="calendar-grid" id="cal-days"></div>
    </div>
    <div class="card">
      <div class="section-title">添加任务</div>
      <div class="input-row">
        <input id="w-input" placeholder="添加工作任务..." onkeydown="if(event.key==='Enter')addWork()"/>
        <input id="w-date-input" type="date" style="max-width:140px"/>
        <select id="w-pri">
          <option value="high">紧急</option>
          <option value="mid" selected>普通</option>
          <option value="low">轻松</option>
        </select>
        <button class="btn-add" onclick="addWork()">+ 添加</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="section-title" style="margin-bottom:0">全部任务</div>
        <div style="display:flex;gap:6px">
          <button class="filter-btn on" id="atf-all" onclick="setATF('all',this)" style="font-size:11px;padding:4px 8px">全部</button>
          <button class="filter-btn" id="atf-todo" onclick="setATF('todo',this)" style="font-size:11px;padding:4px 8px">⏳ 未完成</button>
          <button class="filter-btn" id="atf-done" onclick="setATF('done',this)" style="font-size:11px;padding:4px 8px">✅ 已完成</button>
          <button class="filter-btn" id="atf-future" onclick="setATF('future',this)" style="font-size:11px;padding:4px 8px">🔮 未来</button>
        </div>
      </div>
      <div id="all-tasks-list"></div>
    </div>
    <div class="card">
      <div class="section-title">进度统计</div>
      <div class="stats-grid" style="grid-template-columns:repeat(2,1fr)">
        <div class="stat-card"><div class="stat-label">总任务</div><div class="stat-val" id="w-total">0</div></div>
        <div class="stat-card"><div class="stat-label">已完成</div><div class="stat-val income" id="w-done">0</div></div>
      </div>
      <div id="w-bar-wrap"></div>
    </div>
  </div>

  <!-- 生活面板 -->
  <div id="tab-life" class="panel">
    <div class="card">
      <div class="section-title">生活事项</div>
      <div class="input-row">
        <input id="l-input" placeholder="添加生活事项..." onkeydown="if(event.key==='Enter')addLife()"/>
        <input id="l-date" type="date" style="max-width:140px"/>
        <button class="btn-add" onclick="addLife()">+ 添加</button>
      </div>
      <div id="life-list"></div>
    </div>
    <div class="card">
      <div class="section-title">习惯追踪（本周）</div>
      <div id="habit-area"></div>
      <div class="input-row" style="margin-top:12px">
        <input id="h-input" placeholder="新增习惯..." onkeydown="if(event.key==='Enter')addHabit()"/>
        <button class="btn-add" onclick="addHabit()">+ 习惯</button>
      </div>
    </div>
  </div>

  <!-- 台账面板 -->
  <div id="tab-ledger" class="panel">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">本月收入</div><div class="stat-val income" id="l-in">¥0</div></div>
      <div class="stat-card"><div class="stat-label">本月支出</div><div class="stat-val expense" id="l-out">¥0</div></div>
      <div class="stat-card"><div class="stat-label">月度剩余</div><div class="stat-val remain" id="l-month-remain">¥4000</div></div>
      <div class="stat-card"><div class="stat-label">今日已花</div><div class="stat-val expense" id="l-day-spent">¥0</div></div>
      <div class="stat-card"><div class="stat-label">今日剩余</div><div class="stat-val day" id="l-day-remain">¥75</div></div>
    </div>
    <div class="card">
      <div class="section-title">记一笔</div>
      <div class="input-row">
        <input id="led-name" placeholder="描述（如：咖啡）"/>
        <input id="led-amt" type="number" placeholder="金额" style="max-width:90px" min="0"/>
        <select id="led-type"><option value="out">支出</option><option value="in">收入</option></select>
        <select id="led-cat">
          <option>餐饮</option><option>交通</option><option>购物</option>
          <option>娱乐</option><option>工资</option><option>其他</option>
        </select>
      </div>
      <div class="input-row">
        <input id="led-date" type="date" style="max-width:150px"/>
        <button class="btn-add" onclick="addLedger()">记账</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">分类支出</div>
      <div id="cat-bars"><div class="empty">暂无支出数据</div></div>
    </div>
    <div class="card">
      <div class="section-title">明细记录</div>
      <div class="filter-row">
        <button class="filter-btn on" onclick="setLF('all',this)">全部</button>
        <button class="filter-btn" onclick="setLF('in',this)">收入</button>
        <button class="filter-btn" onclick="setLF('out',this)">支出</button>
      </div>
      <div id="ledger-list"></div>
    </div>
  </div>

  <!-- 💡 灵感面板 -->
  <div id="tab-ideas" class="panel">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-title" style="margin-bottom:0">💡 我的灵感</div>
        <button onclick="clearIdeas()" style="font-size:11px;color:#ccc;background:none;border:none;cursor:pointer">清空</button>
      </div>
      <div class="input-row">
        <input id="idea-input" placeholder="随手记录一个灵感..." onkeydown="if(event.key==='Enter')addIdea()"/>
        <button class="btn-add" onclick="addIdea()">+ 记录</button>
      </div>
      <div id="ideas-list"></div>
    </div>
  </div>
</div>

<script>
// 💰 固定零花钱配置
const MONTHLY_ALLOWANCE = 4000;
const DAILY_LIMIT = 75;

var today=new Date();
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtD(s){var p=s.split('-');return p[1]+'月'+p[2]+'日'}

var calY=today.getFullYear(),calM=today.getMonth();
var selDate=fmt(today);
var wFilter='all',lFilter='all';

// ========== 🔥 FIREBASE 配置区 ==========
// 第一步：把下面的配置替换成你自己的 Firebase 配置
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB8_r-bo-P3WWb5LuMt1RwJosocRCjd-w",
  authDomain:        "my-schedule-27700.firebaseapp.com",
  databaseURL:       "https://my-schedule-27700-default-rtdb.firebaseio.com",
  projectId:         "my-schedule-27700",
  storageBucket:     "my-schedule-27700.firebasestorage.app",
  messagingSenderId: "1099047576023",
  appId:             "1:1099047576023:web:6eced80fb6a8a12491dd92"
};
// ==========================================

// Firebase 初始化
var firebaseApp, db, dbRef;
var fbReady = false;

function initFirebase(){
  try {
    firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database(firebaseApp);
    dbRef = db.ref('mydata');
    fbReady = true;
    showSyncStatus('connecting');
    dbRef.on('value', function(snapshot){
      var data = snapshot.val();
      if(data){
        wTasks  = data.wTasks  || [];
        lTasks  = data.lTasks  || [];
        ledger  = data.ledger  || [];
        habits  = data.habits  || [{"name":"早起","checks":[0,0,0,0,0,0,0]},{"name":"运动","checks":[0,0,0,0,0,0,0]},{"name":"阅读","checks":[0,0,0,0,0,0,0]}];
        chats   = data.chats   || [];
        ideas   = data.ideas   || [];
        renderAll();
        showSyncStatus('synced');
      } else {
        saveCloud();
        showSyncStatus('synced');
      }
    }, function(err){
      console.error('Firebase error:', err);
      showSyncStatus('error');
    });
  } catch(e){
    console.error('Firebase init error:', e);
    fbReady = false;
    showSyncStatus('error');
  }
}

function showSyncStatus(state){
  var el = document.getElementById('sync-status');
  if(!el) return;
  var map = {
    connecting: {icon:'🔄', text:'连接中...', color:'#ef9f27'},
    synced:     {icon:'☁️', text:'已同步',   color:'#1d9e75'},
    saving:     {icon:'💾', text:'保存中...', color:'#185fa5'},
    error:      {icon:'⚠️', text:'离线模式', color:'#e24b4a'},
    local:      {icon:'💻', text:'本地模式', color:'#aaa'}
  };
  var s = map[state] || map.local;
  el.innerHTML = '<span style="color:'+s.color+'">'+s.icon+' '+s.text+'</span>';
}

function renderAll(){
  renderCal(); renderWork(); renderAllTasks(); renderLife(); renderHabits(); renderLedger(); renderChat(); renderIdeas();
}

// 本地数据（用于离线兜底）
var wTasks=JSON.parse(localStorage.getItem('_wt')||'[]');
var lTasks=JSON.parse(localStorage.getItem('_lt')||'[]');
var ledger=JSON.parse(localStorage.getItem('_ld')||'[]');

function save(){
  // 本地备份
  localStorage.setItem('_wt',JSON.stringify(wTasks));
  localStorage.setItem('_lt',JSON.stringify(lTasks));
  localStorage.setItem('_ld',JSON.stringify(ledger));
  localStorage.setItem('_hb',JSON.stringify(habits));
  localStorage.setItem('_chat',JSON.stringify(chats));
  localStorage.setItem('_ideas',JSON.stringify(ideas));
  // 云端同步
  if(fbReady) saveCloud();

  showSyncStatus('saving');
  dbRef.set({
    wTasks, lTasks, ledger, habits, chats, ideas,
    lastSaved: new Date().toISOString()
  }).then(function(){
    showSyncStatus('synced');
  }).catch(function(){

}

// --- CALENDAR ---
var wDays=['日','一','二','三','四','五','六'];
function renderCal(){
  document.getElementById('cal-hds').innerHTML=wDays.map(d=>'<div class="cal-hd">'+d+'</div>').join('');
  document.getElementById('cal-title').textContent=calY+'年'+(calM+1)+'月';
  var first=new Date(calY,calM,1);
  var lastDay=new Date(calY,calM+1,0).getDate();
  var startDow=first.getDay();
  var todayStr=fmt(today);
  var taskDates=new Set(wTasks.map(t=>t.date));
  var html='';
  for(var i=0;i<startDow;i++)html+='<div class="cal-day empty-day"></div>';
  for(var d=1;d<=lastDay;d++){
    var ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cls='cal-day';
    if(ds===todayStr)cls+=' today';
    else if(ds===selDate)cls+=' selected';
    if(taskDates.has(ds))cls+=' has-task';
    html+='<div class="'+cls+'" onclick="selectDate(\''+ds+'\')">' +d+'</div>';
  }
  document.getElementById('cal-days').innerHTML=html;
}
function selectDate(ds){
  selDate=ds;
  renderCal();
  renderAllTasks();
}
function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCal();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();}

var catColors={餐饮:'#d85a30',交通:'#185fa5',购物:'#993356',娱乐:'#7f77dd',工资:'#1d9e75',其他:'#888780'};
function addLedger(){
  var name=document.getElementById('led-name').value.trim();
  var amt=parseFloat(document.getElementById('led-amt').value);
  if(!name||!amt||amt<=0)return;
  var type=document.getElementById('led-type').value;
  var cat=document.getElementById('led-cat').value;
  var d=document.getElementById('led-date').value||fmt(today);
  
  if(type==='out' && d===fmt(today)){
    const todaySpent = ledger.filter(i=>i.date===fmt(today)&&i.type==='out').reduce((a,b)=>a+b.amt,0);
    if(todaySpent + amt > DAILY_LIMIT){
      if(!confirm('今日已超预算！确定要记账吗？')) return;
    }
  }

  ledger.push({id:Date.now(),name,amt,type,cat,date:d});

  save();renderLedger();

function setLF(f,el){lFilter=f;document.querySelectorAll('#tab-ledger .filter-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');renderLedger();}
function renderLedger(){
  var now=new Date();
  var ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  var todayStr = fmt(today);
  
  var monthly=ledger.filter(l=>l.date.startsWith(ym));
  var tIn=monthly.filter(l=>l.type==='in').reduce((a,b)=>a+b.amt,0);
  var tOut=monthly.filter(l=>l.type==='out').reduce((a,b)=>a+b.amt,0);
  
  var monthRemain = MONTHLY_ALLOWANCE - tOut;
  var daySpent = ledger.filter(l=>l.date===todayStr&&l.type==='out').reduce((a,b)=>a+b.amt,0);
  var dayRemain = DAILY_LIMIT - daySpent;

  document.getElementById('l-in').textContent='¥'+tIn.toFixed(0);
  document.getElementById('l-out').textContent='¥'+tOut.toFixed(0);
  document.getElementById('l-month-remain').textContent='¥'+Math.max(monthRemain,0).toFixed(0);
  document.getElementById('l-day-spent').textContent='¥'+daySpent.toFixed(0);
  document.getElementById('l-day-remain').textContent='¥'+Math.max(dayRemain,0).toFixed(0);

  var outItems=monthly.filter(l=>l.type==='out');
  var catMap={};
  outItems.forEach(l=>{catMap[l.cat]=(catMap[l.cat]||0)+l.amt;});
  var cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  var maxCat=Math.max(...cats.map(c=>c[1]),1);
  document.getElementById('cat-bars').innerHTML=cats.length?cats.map(([cat,amt])=>{
    var pct=Math.round(amt/maxCat*100);
    return '<div class="bar-row"><div class="bar-label">'+cat+'</div><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+(catColors[cat]||'#888')+'"></div></div><div class="bar-val">¥'+amt.toFixed(0)+'</div></div>';
  }).join(''):'<div class="empty">暂无支出数据</div>';

  var items=lFilter==='all'?ledger:ledger.filter(l=>l.type===lFilter);
  items=[...items].sort((a,b)=>b.date.localeCompare(a.date));
  var ll=document.getElementById('ledger-list');
  if(!items.length){ll.innerHTML='<div class="empty">暂无记录</div>';return;}
  ll.innerHTML=items.map(l=>'<div class="ledger-item"><div class="ldot" style="background:'+(catColors[l.cat]||'#888')+'"></div><div class="linfo"><div class="lname">'+l.name+'</div><div class="lmeta">'+l.cat+' · '+fmtD(l.date)+'</div></div><div class="lamt '+(l.type==='in'?'in':'out')+'">'+(l.type==='in'?'+':'-')+'¥'+l.amt.toFixed(0)+'</div><span class="task-del" onclick="delL2('+l.id+')">×</span></div>').join('');
}

// 🔥 核心：灵感助手 AI智能分类
function sendChat(){
  var text=document.getElementById('chat-input').value.trim();
  if(!text)return;
  chats.push({role:'user',text});
  document.getElementById('chat-input').value='';
  
  setTimeout(()=>{
    const {type, reply, amount} = aiClassify(text);
    // 保存灵感
    if(type === 'idea') ideas.push({id:Date.now(),text,date:fmt(today)});
    chats.push({role:'bot',text:reply, type, amount, origin:text});
    save();
    renderChat();
    const chatBox=document.getElementById('chat-box');
    chatBox.scrollTop=chatBox.scrollHeight;
  },500);
  
  save();
  renderChat();
}

// 🔥 AI智能分类核心算法
function aiClassify(text){
  var lower = text.toLowerCase();
  var numMatch = text.match(/([0-9]+(\.[0-9]+)?)/);
  var safe = text.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  if(/会议|报告|项目|工作|任务|加班|客户|领导|办公/.test(lower)){
    return {type:'work', reply:'✅ AI分类：<span class="ai-tag tag-work">工作任务</span><br>「'+text+'」<br><button class="ai-add-btn" onclick="aiAddWork(this)">一键添加到工作</button>', origin:text}
  } else if(/吃饭|购物|运动|阅读|睡觉|家务|健身|电影|旅行|喝水|休息/.test(lower)){
    return {type:'life', reply:'✅ AI分类：<span class="ai-tag tag-life">生活事项</span><br>「'+text+'」<br><button class="ai-add-btn" onclick="aiAddLife(this)">一键添加到生活</button>', origin:text}
  } else if(/钱|花费|买|花了|消费|付款|餐饮|交通|奶茶|咖啡|快递|房租/.test(lower) && numMatch){
    var amt = numMatch[1];
    return {type:'ledger', amount:amt, reply:'✅ AI分类：<span class="ai-tag tag-ledger">台账支出</span><br>「'+text+'」¥'+amt+'<br><button class="ai-add-btn" onclick="aiAddLedger(this,'+amt+')">一键添加到台账</button>', origin:text}
  } else {
    ideas.push({id:Date.now(),text,date:fmt(today)});
    return {type:'idea', reply:'💡 AI分类：<span class="ai-tag tag-idea">灵感</span><br>「'+text+'」<br>已保存到灵感 ✨'}
  }
}

var atFilter = 'all';

function setATF(f, el){
  atFilter = f;
  document.querySelectorAll('#all-tasks-list').forEach(()=>{});
  document.querySelectorAll('[id^="atf-"]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderAllTasks();
}

function renderAllTasks(){
  var todayStr = fmt(today);
  var list = document.getElementById('all-tasks-list');
  if(!list) return;
  var items = [...wTasks];

  if(atFilter === 'todo')    items = items.filter(t => !t.done && t.date <= todayStr);
  else if(atFilter === 'done')   items = items.filter(t => t.done);
  else if(atFilter === 'future') items = items.filter(t => !t.done && t.date > todayStr);

  items.sort((a,b) => a.date.localeCompare(b.date));
  var grp = {};
  items.forEach(t => { if(!grp[t.date]) grp[t.date]=[]; grp[t.date].push(t); });
  var dates = Object.keys(grp);

  if(!dates.length){ list.innerHTML='<div class="empty">暂无任务</div>'; return; }

  list.innerHTML = dates.map(d => {
    var isToday = d === todayStr;
    var isPast = d < todayStr;
    var label = isToday ? '📅 今天' : (isPast ? '⏰ ' + fmtD(d) : '🔮 ' + fmtD(d));
    var labelColor = isToday ? '#185fa5' : (isPast ? '#e24b4a' : '#1d9e75');
    var rows = grp[d].map(t => {
      var pc = t.pri==='high'?'p-high':t.pri==='mid'?'p-mid':'p-low';
      return '<div class="task-item"><div class="priority-dot '+pc+'"></div><div class="task-check'+(t.done?' done':'')+'" onclick="toggleWFromAll('+t.id+')"></div><div class="task-text'+(t.done?' done':'')+'">'+t.text+(t.pri==='high'&&!t.done?'<span class="tag-urgent">紧急</span>':'')+'</div><span class="task-del" onclick="delWFromAll('+t.id+')">×</span></div>';
    }).join('');
    return '<div style="font-size:12px;font-weight:600;color:'+labelColor+';margin:10px 0 6px">'+label+'</div>'+rows;
  }).join('');
}

function toggleWFromAll(id){ var t=wTasks.find(t=>t.id===id); if(t)t.done=!t.done; save(); renderAllTasks(); renderCal(); }
function delWFromAll(id){ wTasks=wTasks.filter(t=>t.id!==id); save(); renderAllTasks(); renderCal(); }

// --- 🎙️ 语音主面板 ---
var voiceMainRecog = null;
var isMainListening = false;

(function initVoiceMain(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  voiceMainRecog = new SR();
  voiceMainRecog.lang = 'zh-CN';
  voiceMainRecog.continuous = false;
  voiceMainRecog.interimResults = true;

  voiceMainRecog.onstart = function(){
    isMainListening = true;
    var btn = document.getElementById('voice-main-btn');
    if(btn){ btn.textContent='⏹️'; btn.style.background='#e24b4a'; }
    document.getElementById('voice-main-hint').textContent = '🎙️ 正在聆听，请说话...';
    document.getElementById('voice-result-box').style.display = 'none';
  };
  voiceMainRecog.onresult = function(e){
    var t='';
    for(var i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript;
    document.getElementById('voice-result-text').value = t;
    if(e.results[e.results.length-1].isFinal){
      document.getElementById('voice-main-hint').textContent = '✨ 豆包润色中...';
      document.getElementById('voice-result-box').style.display = 'block';
      polishVoiceMain(t);
    }
  };
  voiceMainRecog.onerror = function(e){
    document.getElementById('voice-main-hint').textContent = '❌ 识别失败，请重试';
    stopVoiceMain();
  };
  voiceMainRecog.onend = function(){ stopVoiceMain(); };
})();

function toggleVoiceMain(){
  if(!voiceMainRecog){ alert('请用 Safari 或 Chrome 浏览器'); return; }
  if(isMainListening){ voiceMainRecog.stop(); }
  else {
    document.getElementById('voice-save-hint').textContent = '';
    voiceMainRecog.start();
  }
}
function stopVoiceMain(){
  isMainListening = false;
  var btn = document.getElementById('voice-main-btn');
  if(btn){ btn.textContent='🎙️'; btn.style.background='#2c2c2a'; }
}
async function polishVoiceMain(text){
  var hint = document.getElementById('voice-main-hint');
  var textarea = document.getElementById('voice-result-text');
  try {
    var prompt = '你是日程助手，把语音识别文字整理成简洁记录，纠正错别字，提炼重点，去口头语，直接输出结果不加解释。原文：' + text;
    const resp = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DOUBAO_API_KEY},
      body: JSON.stringify({model: DOUBAO_MODEL, messages: [{role: 'user', content: prompt}], max_tokens: 200})
    });
    const data = await resp.json();
    if(data.choices && data.choices[0]){
      textarea.value = data.choices[0].message.content.trim();
      hint.textContent = '✨ 豆包已润色，请选择保存位置';
    } else {
      hint.textContent = '✅ 识别完成，请选择保存位置';
    }
  } catch(e) {
    hint.textContent = '✅ 识别完成，请选择保存位置';
  }
}
function saveVoiceTo(target){
  var text = document.getElementById('voice-result-text').value.trim();
  if(!text){ alert('没有内容可保存'); return; }
  var saveHint = document.getElementById('voice-save-hint');
  if(target==='work'){
    wTasks.push({id:Date.now(),text,done:false,pri:'mid',date:fmt(today)});
    save(); saveHint.textContent = '✅ 已存入工作任务';
  } else if(target==='life'){
    lTasks.push({id:Date.now(),text,done:false,date:fmt(today)});
    save(); saveHint.textContent = '✅ 已存入生活事项';
  } else if(target==='ledger'){
    var numMatch = text.match(/(\d+(\.\d+)?)/);
    var amt = numMatch ? parseFloat(numMatch[1]) : 0;
    ledger.push({id:Date.now(),name:text,amt,type:'out',cat:'其他',date:fmt(today)});
    save(); saveHint.textContent = '✅ 已存入台账';
  } else if(target==='ideas'){
    ideas.push({id:Date.now(),text,date:fmt(today)});
    save(); renderIdeas(); saveHint.textContent = '✅ 已存入灵感';
  }
  setTimeout(()=>{ saveHint.textContent=''; }, 3000);
}

  if(!v) return;
  ideas.push({id:Date.now(), text:v, date:fmt(today)});
  document.getElementById('idea-input').value = '';
  save(); renderIdeas();
}
function renderIdeas(){
  var list = document.getElementById('ideas-list');
  if(!list) return;
  if(!ideas.length){ list.innerHTML='<div class="empty">还没有灵感，随手记一个吧 ✨</div>'; return; }
  var sorted = [...ideas].sort((a,b)=>b.id-a.id);
  list.innerHTML = sorted.map(item=>`
    <div class="task-item">
      <div style="flex:1">
        <div style="font-size:14px;color:#2c2c2a;line-height:1.6">${item.text}</div>
        <div style="font-size:11px;color:#bbb;margin-top:2px">${fmtD(item.date)}</div>
      </div>
      <span class="task-del" onclick="delIdea(${item.id})">×</span>
    </div>
  `).join('');
}
function delIdea(id){ ideas=ideas.filter(i=>i.id!==id); save(); renderIdeas(); }
function clearIdeas(){ if(confirm('确定清空所有灵感？')) { ideas=[]; save(); renderIdeas(); } }

// --- 🎙️ 语音识别 + 豆包AI润色 ---
var voiceRecog = null;
var isListening = false;
var rawTranscript = '';

// 豆包 API 配置
const DOUBAO_API_KEY = 'ark-7369c807-376a-443f-b43f-3bd16c34c4dd-64e0c';
const DOUBAO_MODEL = 'doubao-1-5-pro-32k-250115';

(function initVoice(){
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var hint = document.getElementById('voice-hint');
  var btn = document.getElementById('voice-btn');
  if(!SpeechRecognition){
    if(btn) btn.title = '当前浏览器不支持语音识别（推荐Chrome/Safari）';
    if(hint) hint.innerHTML = '<span class="voice-no-support">⚠️ 当前浏览器不支持语音识别</span>';
    return;
  }
  voiceRecog = new SpeechRecognition();
  voiceRecog.lang = 'zh-CN';
  voiceRecog.continuous = false;
  voiceRecog.interimResults = true;
  voiceRecog.maxAlternatives = 1;

  voiceRecog.onstart = function(){
    isListening = true;
    rawTranscript = '';
    var btn = document.getElementById('voice-btn');
    var hint = document.getElementById('voice-hint');
    btn.classList.add('listening');
    btn.textContent = '⏹️';
    hint.textContent = '🎙️ 正在聆听，请说话...';
  };
  voiceRecog.onresult = function(e){
    var transcript = '';
    for(var i = e.resultIndex; i < e.results.length; i++){
      transcript += e.results[i][0].transcript;
    }
    rawTranscript = transcript;
    document.getElementById('chat-input').value = transcript;
    var hint = document.getElementById('voice-hint');
    if(e.results[e.results.length-1].isFinal){
      hint.textContent = '✅ 识别完成，豆包润色中...';
      polishWithDoubao(transcript);
    } else {
      hint.textContent = '🎙️ ' + transcript;
    }
  };
  voiceRecog.onerror = function(e){
    var msg = {
      'not-allowed':'❌ 麦克风权限被拒绝，请在浏览器设置中允许',
      'no-speech':'💬 未检测到声音，请靠近麦克风重试',
      'network':'⚠️ 语音识别需要联网',
      'aborted':'已停止识别'
    };
    document.getElementById('voice-hint').textContent = msg[e.error] || ('❌ 识别失败：' + e.error);
    stopVoice();
  };
  voiceRecog.onend = function(){ stopVoice(); };
})();

async function polishWithDoubao(text){
  var hint = document.getElementById('voice-hint');
  var input = document.getElementById('chat-input');
  try {
    hint.textContent = '✨ 豆包润色中...';
    var prompt = '你是日程助手，把语音识别文字整理成简洁任务记录，纠正错别字，提炼重点，去口头语，直接输出结果不加解释。原文：' + text;
    const resp = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DOUBAO_API_KEY},
      body: JSON.stringify({model: DOUBAO_MODEL, messages: [{role: 'user', content: prompt}], max_tokens: 200})
    });
    const data = await resp.json();
    if(data.choices && data.choices[0]){
      var polished = data.choices[0].message.content.trim();
      input.value = polished;
      hint.textContent = '✨ 豆包已润色，可发送或继续修改';
    } else {
      hint.textContent = '✅ 识别完成（润色失败，已保留原文）';
    }
  } catch(e) {
    hint.textContent = '✅ 识别完成（润色失败，已保留原文）';
  }
}


function toggleVoice(){
  if(!voiceRecog){
    alert('当前浏览器不支持语音识别，请使用 Safari 或 Chrome');
    return;
  }
  if(isListening){ voiceRecog.stop(); }
  else {
    document.getElementById('chat-input').value = '';
    document.getElementById('voice-hint').textContent = '';
    voiceRecog.start();
  }
}
function stopVoice(){
  isListening = false;
  var btn = document.getElementById('voice-btn');
  if(btn){ btn.classList.remove('listening'); btn.textContent = '🎙️'; }
}
